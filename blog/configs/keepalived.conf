# ============================================
# Backup 节点配置（部分配置不同）
# ============================================
# 注意：Backup 节点使用相同的配置文件，只需将 priority 改为更低的值
# 例如：priority 90 而不是 100
# 通过 Ansible 或配置管理系统自动根据节点角色替换