# Keepalived 高可用配置文件
# 用于 VPC 路由器主备配置
# 配置位置：/etc/keepalived/keepalived.conf

global_defs {
    script_user root root
    enable_script_security
    router_id CLOUD_PLATFORM_VPC_1
    notification_email {
        admin@company.com
        ops@company.com
    }
    notification_email_from keepalived@company.com
    smtp_server 192.168.1.100
    smtp_connect_timeout 30
}

# ============================================
# 脑裂检测脚本
# ============================================
vrrp_script check_split_brain {
    script "/usr/local/bin/detect_split_brain.py"
    interval 2              # 每 2 秒检查一次
    weight -50              # 检测失败：优先级 -50
    fall 2                  # 连续失败 2 次触发
    rise 3                  # 连续成功 3 次恢复
    timeout 3               # 脚本执行超时 3 秒
}

# 路由可达性检查脚本
vrrp_script check_route {
    script "/usr/local/bin/check_routes.sh"
    interval 5
    weight -30
    fall 3
    rise 2
}

# ============================================
# VPC 1 的虚拟路由器配置
# ============================================
vrrp_instance VPC_VIP_1 {
    # 基本配置
    state BACKUP                    # 两边都配置 BACKUP，由优先级决定
    interface eth0                  # 管理接口
    virtual_router_id 1             # VPC 1 对应 VRID 1
    priority 100                    # Master 优先级为 100
    advert_int 1                    # 心跳间隔 1 秒
    
    # 认证配置
    authentication {
        auth_type PASS              # 密码认证
        auth_pass vpc_key_1         # 8 字符以内，Master 和 Backup 必须相同
    }
    
    # 抢占配置（关键！）
    preempt true                    # 启用抢占
    preempt_delay 300               # 延迟 5 分钟再抢占（给 Master 充分启动时间）
    
    # 脑裂防护
    track_script {
        check_split_brain           # 多路径脑裂检测
        check_route                 # 路由可达性检查
    }
    
    # 虚拟 IP 配置
    virtual_ipaddress {
        10.0.1.1/24 dev eth0 label eth0:vip
    }
    
    # 虚拟 MAC 地址（可选，但推荐）
    # 使用虚拟 MAC 可以减少 ARP 学习延迟
    use_vmac true
    vmac_xmit_base
    
    # 角色转换时的通知脚本
    notify_master "/usr/local/bin/keepalived_notify.sh MASTER"
    notify_backup "/usr/local/bin/keepalived_notify.sh BACKUP"
    notify_fault "/usr/local/bin/keepalived_notify.sh FAULT"
    notify_stop "/usr/local/bin/keepalived_notify.sh STOP"
}

# ============================================
# VPC 2 的虚拟路由器配置
# ============================================
vrrp_instance VPC_VIP_2 {
    state BACKUP
    interface eth1                  # 不同的管理接口
    virtual_router_id 2             # VPC 2 对应 VRID 2
    priority 100
    advert_int 1
    
    authentication {
        auth_type PASS
        auth_pass vpc_key_2
    }
    
    preempt true
    preempt_delay 300
    
    track_script {
        check_split_brain
        check_route
    }
    
    virtual_ipaddress {
        10.1.1.1/24 dev eth1 label eth1:vip
    }
    
    use_vmac true
    vmac_xmit_base
    
    notify_master "/usr/local/bin/keepalived_notify.sh MASTER"
    notify_backup "/usr/local/bin/keepalived_notify.sh BACKUP"
    notify_fault "/usr/local/bin/keepalived_notify.sh FAULT"
    notify_stop "/usr/local/bin/keepalived_notify.sh STOP"
}

